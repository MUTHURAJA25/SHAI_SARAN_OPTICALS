version: "3.9"

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  api:
    build:
      context: ./backend
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/opticalshop
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-your_key_id}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-your_key_secret}
    ports:
      - "5000:5000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://localhost:5000
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongo_data:

