<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MxK Opticals</title>
    <script type="text/javascript">
        // Safe check to avoid infinite redirect loops on non-existent pages
        if (window.location.pathname.includes("/pages/")) {
            window.addEventListener("DOMContentLoaded", () => {
                document.body.innerHTML = `
                    <div style="text-align: center; margin-top: 10vh;">
                        <h1 style="color: #f43f5e; font-size: 3rem; margin-bottom: 10px;">404</h1>
                        <h2 style="color: #ffffff; margin-bottom: 20px;">Page Not Found</h2>
                        <p style="color: #94a3b8; margin-bottom: 30px;">The requested page does not exist or has been moved.</p>
                        <a href="/pages/home.html" style="display: inline-block; background: #facc15; color: #020617; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: bold;">
                            Go Back to Home
                        </a>
                    </div>
                `;
            });
        } else {
            window.location.replace("pages/home.html");
        }
    </script>
</head>
<body style="background: #0b0f19; color: #94a3b8; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <h2 style="color: #facc15; margin-bottom: 10px;">Loading Your Optical Studio...</h2>
        <p>If you are not redirected automatically, <a href="pages/home.html" style="color: #38bdf8; text-decoration: none;">click here</a>.</p>
    </div>
</body>
</html>
