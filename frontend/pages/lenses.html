<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenses & Contacts - MxK Opticals</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .tab-btn {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-muted);
            transition: var(--transition);
        }
        .tab-btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }
        .tab-btn.active {
            background: var(--accent);
            color: #020617;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="page">
        <h1 class="section-title">Lenses & Contact Lenses</h1>

        <!-- Category Tab Switcher -->
        <div class="tabs">
            <button id="tab-lens" class="tab-btn active" data-type="lens">Prescription Lenses</button>
            <button id="tab-contact-lens" class="tab-btn" data-type="contact-lens">Contact Lenses</button>
        </div>

        <!-- Search & Filter Controls -->
        <div class="filters">
            <input type="text" id="search-input" class="input" placeholder="Search by name...">
            <input type="text" id="brand-input" class="input" placeholder="Filter by brand...">
        </div>

        <!-- Dynamic Content Containers -->
        <div id="loading-state" class="empty-state" style="display: none;">
            Loading lenses collection...
        </div>
        
        <div id="error-state" class="empty-state" style="display: none; border-color: var(--error); color: var(--error);">
            Failed to load products. Please check if the server is running.
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
            No items found matching your filters.
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
            <!-- Dynamically populated via lenses.js -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="common.js"></script>
    <script src="lenses.js"></script>
</body>
</html>
