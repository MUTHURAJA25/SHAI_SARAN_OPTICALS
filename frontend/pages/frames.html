<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frames - SHAI SARAN Opticals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="page">
        <h1 class="section-title">Browse Frames</h1>

        <!-- Search & Filter Controls -->
        <div class="filters">
            <input type="text" id="search-input" class="input" placeholder="Search by name...">
            <input type="text" id="brand-input" class="input" placeholder="Filter by brand...">
        </div>

        <!-- Dynamic Content Containers -->
        <div id="loading-state" class="empty-state" style="display: none;">
            Loading frames collection...
        </div>
        
        <div id="error-state" class="empty-state" style="display: none; border-color: var(--error); color: var(--error);">
            Failed to load products. Please check if the server is running.
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
            No frames found matching your filters.
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
            <!-- Dynamically populated via frames.js -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="common.js"></script>
    <script src="frames.js"></script>
</body>
</html>
